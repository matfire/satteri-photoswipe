name: release

on:
  push:
    tags:
      - "*"

jobs:
  stage-publish:
    runs-on: ubuntu-latest
    concurrency:
      group: stage-publish-${{ github.ref }}
      cancel-in-progress: false
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.7.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify tag matches package version
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          version="$(node -p "JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).version")"

          if [ "${tag}" != "${version}" ] && [ "${tag}" != "v${version}" ]; then
            echo "Release tag ${tag} does not match package.json version ${version}." >&2
            echo "Use ${version} or v${version}." >&2
            exit 1
          fi

      - name: Build
        run: pnpm run build

      - name: Install npm with staged publishing support
        run: npm install --global npm@^11.15.0

      - name: Stage publish
        run: npm stage publish --access public --provenance
